apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-backend
  namespace: atlas-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-pod-manager
  namespace: atlas-ai
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-backend-pod-manager
  namespace: atlas-ai
subjects:
  - kind: ServiceAccount
    name: agent-backend
    namespace: atlas-ai
roleRef:
  kind: Role
  name: task-pod-manager
  apiGroup: rbac.authorization.k8s.io
